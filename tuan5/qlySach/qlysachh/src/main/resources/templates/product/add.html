<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id == null ? 'Thêm sản phẩm' : 'Sửa sản phẩm'}">Quản lý sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0" th:text="${product.id == null ? 'Thêm sản phẩm mới' : 'Cập nhật sản phẩm'}">Thông tin sản phẩm</h4>
                    </div>
                    <div class="card-body p-4">
                        <form th:action="@{/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
                            <input type="hidden" th:field="*{id}">
                            
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tên sản phẩm:</label>
                                <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên sách..." required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Hình ảnh sản phẩm:</label>
                                <input type="file" name="imageFile" class="form-control" accept="image/*">
                                <input type="hidden" th:field="*{image}">
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Giá bán:</label>
                                <input type="number" th:field="*{price}" class="form-control" step="1000">
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Danh mục:</label>
                                <select th:field="*{category}" class="form-select">
                                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                                </select>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success btn-lg">Lưu sản phẩm</button>
                                <a th:href="@{/products}" class="btn btn-outline-secondary">Quay lại</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
