<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản - H Hightech</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f0f2f5; height: 100vh; display: flex; align-items: center; }
        .register-card { max-width: 400px; width: 100%; margin: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <div class="card register-card border-0 p-4">
        <h2 class="text-center text-primary fw-bold mb-4">Đăng Ký</h2>
        
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/register}" th:object="${account}" method="post">
            <div class="mb-3">
                <label class="form-label fw-bold">Tên đăng nhập</label>
                <input type="text" th:field="*{login_name}" class="form-control rounded-pill" required placeholder="Nhập tên tài khoản...">
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Mật khẩu</label>
                <input type="password" th:field="*{password}" class="form-control rounded-pill" required placeholder="Tạo mật khẩu...">
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill fw-bold mb-3">Đăng ký ngay</button>
            <div class="text-center">
                <p class="text-muted small">Đã có tài khoản? <a href="/login" class="text-decoration-none">Đăng nhập</a></p>
            </div>
        </form>
    </div>
</div>
</body>
</html>
