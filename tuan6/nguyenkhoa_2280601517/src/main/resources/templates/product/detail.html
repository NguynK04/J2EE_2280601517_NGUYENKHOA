<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name} + ' - Chi tiết'">Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .product-hero-img { width: 100%; max-height: 500px; object-fit: contain; padding: 20px; transition: transform 0.5s;}
        .product-hero-img:hover { transform: scale(1.05); }
        .desc-box { background: white; border-radius: 15px; border: 1px solid #eee; padding: 25px; margin-top: 20px; font-size: 1.1rem; line-height: 1.8; color: #444; white-space: pre-line; }
    </style>
</head>
<body>

<div class="container mt-5 mb-5">
    <div class="d-flex justify-content-between mb-4">
        <a href="javascript:history.back()" class="btn btn-outline-dark rounded-pill fw-bold">
            <i class="fas fa-arrow-left"></i> Quay lại
        </a>
        
        <a sec:authorize="hasRole('ADMIN')" th:href="@{'/products/edit/' + ${product.id}}" class="btn btn-warning rounded-pill fw-bold shadow-sm">
            <i class="fas fa-edit"></i> Chỉnh sửa sản phẩm
        </a>
    </div>

    <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
        <div class="row g-0 align-items-center">
            
            <div class="col-md-6 bg-white text-center border-end">
                <img th:src="${product.image}" class="product-hero-img" onerror="this.src='https://via.placeholder.com/500?text=NO+IMAGE';">
            </div>

            <div class="col-md-6 p-5 bg-light h-100">
                <span class="badge bg-dark mb-2 px-3 py-2 rounded-pill fs-6" th:text="${product.category != null ? product.category.name : 'Chưa phân loại'}">Category</span>
                <h1 class="display-5 fw-bold text-dark mb-3" th:text="${product.name}">Tên sản phẩm</h1>
                <h2 class="text-danger fw-bold mb-4" th:text="${#numbers.formatInteger(product.price, 3, 'POINT')} + ' VNĐ'">Giá</h2>

                <hr class="mb-4">

                <h4 class="fw-bold mb-3">Thông tin chi tiết:</h4>
                
                <div class="desc-box shadow-sm" th:text="${product.description != null ? product.description : 'Sản phẩm này chưa có bài viết mô tả.'}">
                </div>

                <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="mt-4">
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow fw-bold">
                        <i class="fas fa-shopping-cart me-2"></i> THÊM VÀO GIỎ HÀNG
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
