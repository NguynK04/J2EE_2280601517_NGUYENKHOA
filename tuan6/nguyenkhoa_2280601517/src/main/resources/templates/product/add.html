<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>H Hightech - Cập nhật Thiết bị</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { background-color: #f0f2f5; }
        .form-card { max-width: 800px; margin: auto; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container mt-5 pb-5">
    <div class="card form-card border-0 p-4">
        <h2 class="text-center text-primary fw-bold mb-4">
            <i class="fas fa-microchip me-2"></i>Cập nhật Thiết bị
        </h2>
        
        <form th:action="@{/products/save}" th:object="${product}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{image}"> <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold">Tên thiết bị</label>
                    <input type="text" th:field="*{name}" class="form-control rounded-pill" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-bold">Giá (VNĐ)</label>
                    <input type="number" th:field="*{price}" class="form-control rounded-pill" min="0" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-bold">Danh mục</label>
                    <select th:field="*{category.id}" class="form-select rounded-pill" required>
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                    </select>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-bold">Ảnh sản phẩm</label>
                    <input type="file" name="imageFile" class="form-control rounded-pill" accept="image/*">
                </div>

                <div class="col-12">
                    <label class="form-label fw-bold">Mô tả chi tiết</label>
                    <textarea th:field="*{description}" class="form-control" rows="6" placeholder="Nhập cấu hình, tính năng nổi bật vào đây..."></textarea>
                </div>
            </div>
            
            <div class="mt-4 d-flex justify-content-between">
                <a href="/products" class="btn btn-outline-secondary rounded-pill fw-bold px-4">Hủy bỏ</a>
                <button type="submit" class="btn btn-primary rounded-pill fw-bold px-5">Lưu Thiết Bị</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
