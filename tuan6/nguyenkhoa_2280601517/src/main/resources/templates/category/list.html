<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>H Hightech - Danh mục</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark px-4 mb-4">
    <a class="navbar-brand fw-bold" href="/products">H Hightech</a>
    <div class="ms-auto">
        <a th:href="@{/products}" class="btn btn-outline-light me-2">Quay lại Sản phẩm</a>
        <a th:href="@{/categories/add}" class="btn btn-success rounded-pill">Thêm danh mục mới</a>
    </div>
</nav>

<div class="container">
    <div class="card border-0 shadow-sm rounded-4">
        <div class="card-body p-0">
            <table class="table table-hover mb-0 text-center">
                <thead class="table-primary">
                <tr>
                    <th>ID</th>
                    <th>Tên danh mục</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${categories}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.name}" class="fw-bold"></td>
                    <td>
                        <a th:href="@{'/categories/edit/' + ${c.id}}" class="btn btn-warning btn-sm shadow-sm"><i class="fas fa-edit"></i></a>
                        <a th:href="@{'/categories/delete/' + ${c.id}}" class="btn btn-danger btn-sm shadow-sm" onclick="return confirm('Xóa cái này là mấy sản phẩm liên quan mất loại luôn đó, chắc không bro?')"><i class="fas fa-trash"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
