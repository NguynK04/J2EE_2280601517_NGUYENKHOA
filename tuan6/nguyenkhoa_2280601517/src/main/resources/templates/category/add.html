<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>H Hightech - Danh mục</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light pt-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-header bg-success text-white text-center py-4">
                    <h4 class="mb-0 fw-bold" th:text="${category.id == null ? 'Thêm Danh mục' : 'Sửa Danh mục'}"></h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/categories/save}" th:object="${category}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Tên loại thiết bị:</label>
                            <input type="text" th:field="*{name}" class="form-control rounded-pill" required placeholder="Drone, Laptop,..." autocomplete="off">
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-dark rounded-pill fw-bold">LƯU DANH MỤC</button>
                            <a th:href="@{/categories}" class="btn btn-light rounded-pill">Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
